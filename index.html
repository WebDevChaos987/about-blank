<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>About Blank</title>
  <style>
    body {
      background-color: #1a1a1a;
      color: white;
      font-family: "Lucida Console", "Courier New", monospace;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    .info-box {
      background-color: white;
      color: black;
      padding: 30px;
      border-radius: 15px;
      display: inline-block;
      margin-top: 20px;
    }

    input, button {
      width: 200px;
      padding: 10px;
      margin: 10px 0;
      font-family: inherit;
    }

    input {
      border-radius: 67px;
      border: none;
      background-color: #1a1a1a;
      color: rgb(255, 255, 255);
    }

    button {
      border-radius: 67px;
      border: none;
      background-color: #708090;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #C0C0C0;
      color: black;
    }

    button:active {
      background-color: #DCDCDC;
    }
  </style>
</head>
<body>

  <header>
    <h1 style="font-size: 10vh;">About Blank</h1>

    <div class="info-box">
      <form action="mailto:avery.mancini.2016@gmail.com" id="loginForm">
        <h2 style="font-size: 30px;">Login</h2>

        <input type="text" id="username" placeholder="Your Username..." required>
        <br>
        <input type="email" id="email" placeholder="Your Email..." name="email" required>

        <br><br>

        <button type="reset">Clear</button>
        <br>
        <button type="submit" onclick="alert('You have successfully logged in!')">Login</button>
      </form>
    </div>
  </header>

</body>
</html>
